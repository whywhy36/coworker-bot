env GITHUB_PAT;
env GITHUB_PERSONAL_ACCESS_TOKEN;
env GITHUB_ORG;
env JIRA_API_TOKEN;
env LINEAR_API_TOKEN;
env HOME;
worker_processes 1;
load_module modules/ndk_http_module.so;
load_module modules/ngx_http_lua_module.so;

error_log /tmp/nginx-error.log;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    access_log /tmp/nginx-access.log;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;
    fastcgi_temp_path     /tmp/nginx-fastcgi;
    uwsgi_temp_path       /tmp/nginx-uwsgi;
    scgi_temp_path        /tmp/nginx-scgi;

    lua_shared_dict github_token 1m;

    # Load auth helpers from the config directory alongside this file.
    init_by_lua_block {
        package.path = os.getenv("HOME") .. "/coworker-bot/config/?.lua;" .. package.path
    }

    server {
        listen 8082;
        location /mcp {
            access_by_lua_block { require("auth").inject_github_token("github_token") }

            proxy_pass http://github-mcp:8082/mcp;
            proxy_set_header Host github-mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }

    server {
        listen 8083;
        location /mcp {
            access_by_lua_block { require("auth").inject_bearer_from_env("JIRA_API_TOKEN") }

            proxy_set_header Host mcp.atlassian.com;
            proxy_pass https://mcp.atlassian.com/v1/mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_ssl_server_name on;
        }
    }

    server {
        listen 8080;
        location /mcp {
            access_by_lua_block { require("auth").inject_bearer_from_env("LINEAR_API_TOKEN") }

            proxy_set_header Host mcp.linear.app;
            proxy_pass https://mcp.linear.app/mcp;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_ssl_server_name on;
        }
    }
}
