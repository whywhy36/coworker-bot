# Watcher Configuration Example
# Copy this file to watcher.yaml and update with your values

# Server configuration for webhook endpoints
server:
  host: 0.0.0.0
  port: 3000
  # Optional base path for all webhook endpoints
  # If set, webhooks will be available at: http://host:port{basePath}/webhook/{provider}
  # Example: basePath: /api → webhooks at http://host:3000/api/webhook/github
  # basePath: /api

# Event deduplication configuration
# Prevents duplicate work by skipping events where the bot already commented
# How it works: Checks the last comment on issues/PRs/threads - if it's from
# the configured bot username, the event is skipped (considered already handled)
# Bot username configuration is provider-specific (see each provider's options)
deduplication:
  enabled: true

  # Comment template (optional)
  # Use {id} placeholder for event display (e.g., "owner/repo#123")
  # This comment is posted when the bot starts working on an event
  commentTemplate: "Agent is working on {id}"

# Log level: debug | info | warn | error
logLevel: info

# Command executor configuration
# When enabled, executes a command for each event with the prompt and event data
commandExecutor:
  enabled: false  # Set to true to enable command execution

  # Dry-run mode: Print command without executing (for testing/debugging)
  dryRun: false  # Set to true to see what would be executed without running it

  # Command to execute (required if enabled)
  # The command receives minimal environment variables:
  #
  # - EVENT_ID: Full event identifier (e.g., "github:owner/repo:opened:123:uuid")
  # - EVENT_SAFE_ID: Sanitized ID safe for shell (e.g., "github_owner_repo_opened_123_uuid")
  # - EVENT_SHORT_ID: Short, unique ID (e.g., "github-owner-repo-123-abc123") RECOMMENDED
  #   Format: provider-repo-number-hash
  #   Examples:
  #     - Issue #123: "github-owner-repo-123-abc123"
  #     - PR #123: "github-owner-repo-123-def456"
  #     - Comment on PR #123: "github-owner-repo-123-ghi789"
  #     - Linear issue: "linear-ENG-456-jkl012"
  #   Hash suffix (6 chars from event ID) ensures uniqueness for all events
  # - EMAIL: Email address of the actor who triggered the event (when available from the provider)
  #   Sources by provider:
  #     - GitHub: resolved via the GitHub API from the actor's username
  #     - Slack: resolved via users.info API from the message sender
  #     - Jira: from the triggering user's emailAddress field in the webhook payload
  #     - Linear: from the actor.email field in the webhook payload, or creator.email when polled
  # - PROMPT: Rendered prompt with all event details (if promptTemplateFile provided and useStdin=false)
  #
  # All event context (provider, type, action, title, URL, etc.) is included in the PROMPT
  # which is rendered from the promptTemplateFile template.
  #
  # Use EVENT_SHORT_ID for command/session names (guaranteed unique per event)
  # command: "cs llm session run --approval=auto --name=$EVENT_SHORT_ID --task"

  # The session will be created and owned by the user with email registered in crafting system.
  command: "cs llm session run --approval=auto --name=$EVENT_SHORT_ID --task --owner=$EMAIL --wait=false"

  # Prompt template configuration (optional)
  # There are three ways to configure prompt templates:

  # Option 1: Single template file (RECOMMENDED - works for all current providers)
  # GitHub and Linear are code platforms with similar workflows:
  # promptTemplateFile: ./config/event-prompt.hbs

  # Option 2: Provider-specific templates (for setups with different platform workflows)
  # Use this when you have providers with fundamentally different workflows:
  # prompts:
  #   slack: ./config/event-prompt-slack.hbs    # Slack's conversational workflow
  #   jira: ./config/event-prompt-jira.hbs      # Jira issue workflow (no PR fields, full issue keys)
  #   linear: ./config/event-prompt-linear.hbs  # Linear issue workflow (team keys, Linear MCP for context)
  # promptTemplateFile: ./config/event-prompt.hbs  # Fallback for GitHub

  # Option 3: Inline template (not recommended, use files instead)
  # promptTemplate: |
  #   Issue: {{resource.title}}
  #   Action: {{action}}
  #   Repository: {{resource.repository}}

  # Pass prompt via stdin instead of environment variable (default: false)
  # If true, prompt is sent to command's stdin; if false, via $PROMPT env var
  useStdin: false

  # Post command output as follow-up comment (default: false)
  # If true, posts a new comment with the command output after execution
  # If false, only posts the initial comment
  followUp: false

  # Template for the follow-up comment (optional, only used when followUp: true)
  # Use {output} placeholder for the command's stdout.
  # Useful for surfacing a link to the newly created session or resource.
  # If not set, the raw command output is posted as-is.
  # Example: "Agent session started. View progress: {output}"
  # followUpTemplate: "Session started: {output}"

# Provider configurations
providers:
  # GitHub Provider
  github:
    enabled: true

    # Webhook mode is always enabled for receiving events from GitHub
    # (Implement your own security/authentication at the reverse proxy or API gateway level)

    # Polling configuration (optional - enables polling mode if repositories are provided)
    pollingInterval: 60  # Polling interval in seconds

    # Authentication — two modes:
    #
    # Mode 1 (GitHub App, recommended): no auth block needed. The nginx mcp-proxy injects the
    # GitHub App installation token automatically using GITHUB_ORG. botUsername must be set
    # explicitly (installation tokens cannot call GET /user for auto-detection).
    #
    # Mode 2 (PAT / bot user): provide an auth block with the PAT:
    # auth:
    #   tokenEnv: GITHUB_PAT   # env var holding the Personal Access Token (GITHUB_PAT or GITHUB_PERSONAL_ACCESS_TOKEN)
    # In PAT mode, botUsername is auto-detected via GET /user if not set. Repositories must be
    # configured explicitly — GET /installation/repositories only works for GitHub App tokens.

    # GitHub-specific options
    options:
      # Webhook secret for signature verification (optional but recommended for production)
      # GitHub signs webhook payloads with HMAC SHA-256 using this secret
      # Configure the same secret in your GitHub webhook settings
      # You can provide the secret directly, via environment variable, or from a file
      # webhookSecret: "your-secret-here"
      webhookSecretEnv: GITHUB_WEBHOOK_SECRET
      # webhookSecretFile: /path/to/secret/file

      # Bot username(s) for deduplication.
      # Activity from these users will be skipped to prevent duplicate work.
      # If the last comment on an issue/PR is by any of these users, the event is skipped.
      #
      # GitHub App mode: REQUIRED — set to the app's bot username (e.g. "my-app[bot]").
      #   Installation tokens cannot call GET /user, so this cannot be auto-detected.
      #   Corresponds to env var: GITHUB_BOT_USERNAME
      #
      # PAT mode: optional — auto-detected from the token via GET /user if not set.
      botUsername: coworker-bot
      # Multiple usernames:
      # botUsername:
      #   - "coworker-bot"
      #   - "another-app[bot]"

      # Watch check failures (optional, default: false)
      # When true, any failed check run (conclusion: failure, timed_out, cancelled,
      # action_required) on a pull request triggers the bot — no assignment or @mention needed.
      # When false (default), check failures only trigger if the PR has a matching triggerLabel.
      # Requires the check_run webhook event to be enabled in your GitHub App / webhook settings.
      watchChecks: true

      # Trigger labels (optional)
      # If an issue or PR has any of these labels, it is always processed regardless
      # of whether the bot is assigned or @mentioned. Useful for GitHub App installs
      # where assigning the bot user is inconvenient.
      # Comparison is case-insensitive. Deduplication still applies.
      # triggerLabels: coworker
      # Multiple labels:
      # triggerLabels:
      #   - coworker
      #   - ai-task

      # Repositories to monitor (required for polling mode)
      repositories:
        - owner/repo1
        - owner/repo2

      # Initial lookback period for first poll (optional, default: 1 hour)
      # When first polling a repository, only fetch items from the last N hours
      # This prevents overwhelming the system with hundreds of old issues
      # Examples: 1 (1 hour, default), 6 (6 hours), 24 (1 day), 168 (1 week)
      initialLookbackHours: 1

      # Maximum items to process per poll (optional, default: unlimited)
      # Limits the total number of issues/PRs processed across all repositories
      # Useful to prevent rate limiting and reduce processing load
      maxItemsPerPoll: 50

      # Event filtering (optional)
      # Controls which event types and actions trigger the bot.
      # If omitted, built-in defaults apply:
      #   issues:        all actions processed
      #   pull_request:  skips opened, synchronize, edited, labeled, unlabeled, assigned, unassigned, locked, unlocked
      #   issue_comment: all actions processed
      #   check_run:     completed action only; failure conclusions only; requires watchChecks: true or a triggerLabel
      #   status:        failure/error states only; requires watchChecks: true or a triggerLabel
      # If present, ONLY listed event types are processed.
      # Per event type:
      #   actions     - allowlist; use ['all'] to accept every action (default)
      #   skipActions - denylist applied after the allowlist
      # NOTE: check_run and status also require watchChecks: true or a matching triggerLabel
      # regardless of what eventFilter says — those flags gate the check-failure logic.
      # eventFilter:
      #   issues: {}
      #   pull_request:
      #     actions: ['closed', 'reopened', 'review_requested']
      #   issue_comment: {}
      #   check_run: {}    # enable CI check failure handling (also set watchChecks: true)
      #   status: {}       # enable legacy Status API failure handling (Buildkite OAuth mode)

  # Jira Provider (REST API v3)
  # Supports Jira Cloud (email + API token) and Jira Server/Data Center (PAT)
  # Webhook endpoint: POST /webhook/jira
  # Register this URL in Jira: Project Settings → System → WebHooks → Create a WebHook
  # Triggering events to enable: Issue → created, updated; Comment → created, updated
  jira:
    enabled: false
    pollingInterval: 60  # Poll every 60 seconds

    # Authentication
    # Option A: Jira Cloud with an API token (regular user or bot account with email)
    auth:
      type: basic
      username: user@example.com       # Your Atlassian account email
      tokenEnv: JIRA_API_TOKEN         # API token from id.atlassian.com/manage-profile/security/api-tokens

    # Option B: Personal Access Token (Jira Server/DC or Jira Cloud)
    # auth:
    #   type: token
    #   tokenEnv: JIRA_PERSONAL_ACCESS_TOKEN

    # Option C: Jira Cloud service account with a scoped API token
    # Service accounts use scoped tokens (Bearer auth) and require routing through
    # the Atlassian API gateway with your Cloud ID instead of the standard domain.
    # To find your Cloud ID: curl https://yourcompany.atlassian.net/_edge/tenant_info
    # botUsername must be set explicitly — auto-detection does not work for service accounts.
    # auth:
    #   type: token
    #   tokenEnv: JIRA_API_TOKEN

    options:
      # Base URL of your Jira instance (required)
      # Jira Cloud (regular account):  https://yourcompany.atlassian.net
      # Jira Cloud (service account):  https://api.atlassian.com/ex/jira/{cloudId}
      # Jira Server:                   https://jira.yourcompany.com
      baseUrl: https://yourcompany.atlassian.net

      # Optional shared secret for webhook verification (recommended)
      # Jira Cloud uses this to sign payloads with HMAC-SHA256 in the X-Hub-Signature header.
      # Enter the same value in the "Secret" field when registering the webhook in Jira
      # (Settings → System → WebHooks → Create a WebHook).
      # webhookSecret: "your-secret-here"
      # webhookSecretEnv: JIRA_WEBHOOK_SECRET
      # webhookSecretFile: /path/to/secret

      # Bot display name for deduplication (required)
      # Must match the Jira display name of the bot account exactly (case-insensitive).
      # If omitted, auto-detected via /rest/api/3/myself — works for regular accounts only.
      # Must be set explicitly when using a service account with a scoped API token.
      botUsername: "Coworker Bot"
      # Multiple bot display names:
      # botUsername:
      #   - "Coworker Bot"
      #   - "Backup Bot"

      # Projects to monitor for polling (optional, default: all accessible projects)
      # Use the project KEY (e.g. "PROJ", not the full project name)
      projects:
        - PROJ
        - ENG

      # Initial lookback period for first poll (default: 1 hour)
      initialLookbackHours: 1

      # Maximum issues to process per poll (default: 50)
      maxItemsPerPoll: 50

      # Issue statuses to skip (case-insensitive, default: done, closed, resolved, cancelled, won't fix)
      # Jira issues in these states will not trigger the bot.
      # skipStatuses:
      #   - done
      #   - closed
      #   - resolved
      #   - cancelled

  # Linear Provider (uses GraphQL API)
  linear:
    enabled: false
    pollingInterval: 60  # Poll every 60 seconds

    auth:
      type: token
      tokenEnv: LINEAR_API_TOKEN  # API key from Linear settings

    options:
      # Webhook secret for signature verification (optional but recommended)
      # webhookSecret: "your-webhook-secret"
      webhookSecretEnv: LINEAR_WEBHOOK_SECRET
      # webhookSecretFile: /path/to/secret

      # Bot username(s) for deduplication (required)
      # Activity from these users will be skipped to prevent duplicate work
      # If the last comment on an issue is by any of these users, the event is skipped
      # Linear usernames are typically in the format "john-doe"
      # Can be a single string or array of Linear usernames
      botUsername: coworker-bot-bot
      # Multiple usernames:
      # botUsername:
      #   - "coworker-bot-bot"
      #   - "backup-bot"
      # Tip: Run with logLevel: debug to see which username format Linear returns

      # Teams to monitor (optional, defaults to all teams)
      # Team keys are short identifiers like "ENG", "DESIGN", etc.
      teams:
        - ENG
        - PRODUCT

      # Initial lookback period for first poll (default: 1 hour)
      initialLookbackHours: 1

      # Maximum items to process per poll (default: unlimited)
      maxItemsPerPoll: 50

      # Event filtering (optional)
      # If omitted, built-in default applies: Issue events only, skipping done/cancelled/canceled states
      # states     - allowlist of state names (lowercase); use ['all'] to accept every state (default)
      # skipStates - denylist applied after the allowlist
      # eventFilter:
      #   Issue:
      #     states: ['all']
      #     skipStates: ['done', 'cancelled', 'canceled']
      #   Comment: {}

  # Slack Provider (mention-triggered only)
  slack:
    enabled: false

    # Optional: Enable polling to catch missed mentions
    # Unlike other providers, Slack polling is opt-in via pollingEnabled flag
    # pollingInterval: 300  # Poll every 5 minutes (only if pollingEnabled=true)

    auth:
      type: token
      tokenEnv: SLACK_BOT_TOKEN  # Bot User OAuth Token from Slack app

    options:
      # Signing secret for webhook verification (recommended)
      signingSecretEnv: SLACK_SIGNING_SECRET

      # Enable polling fallback (opt-in)
      # Set to true to search for missed mentions when webhooks fail
      # Requires search:read scope in Slack app
      # pollingEnabled: false

      # Initial lookback period for first poll (default: 1 hour)
      # initialLookbackHours: 1

      # Note: Bot user ID is automatically detected via Slack API
      # No botUsername configuration is needed for Slack
      # The bot's user ID is fetched when the provider initializes

      # Event filtering (optional)
      # Default: only app_mention events are processed
      # Use eventFilter to change which Slack event types trigger the bot
      # eventFilter:
      #   app_mention: {}   # bot is @mentioned (default)
      #   message: {}       # also handle direct messages
